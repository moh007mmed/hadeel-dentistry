<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة هديل أحمد بله | Batch 8</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-glow: #00e5ff;
            --secondary-glow: #0077ff;
            --bg-deep: #010613;
            --bg-ocean: #04142c;
            --text-light: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(to top, var(--bg-deep), var(--bg-ocean));
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* خلفية الجسيمات السحرية (فقاعات تتحول لنجوم) */
        #magicCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* شريط التنقل الهادئ */
        header {
            padding: 25px 40px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(1, 6, 19, 0.9), transparent);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            opacity: 0;
            animation: fadeInDown 1.5s ease forwards 1s;
        }

        .brand h2 {
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
        }

        .batch {
            font-size: 10px;
            border: 1px solid var(--primary-glow);
            color: var(--primary-glow);
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
            opacity: 0;
            animation: fadeInDown 1.5s ease forwards 1.5s;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.4s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--primary-glow);
        }

        /* الواجهة الرئيسية والمجسم الرقمي */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 0 20px;
        }

        /* حاوية السن الرقمي - تطفو من الأسفل */
        .digital-tooth-container {
            position: relative;
            width: 200px;
            height: 250px;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(150px);
            animation: riseFromTheDeep 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.5s, floatSoftly 6s ease-in-out infinite 3.5s;
            cursor: pointer;
            perspective: 1000px;
        }

        /* رسم السن الرقمي باستخدام SVG */
        .tooth-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.6));
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        .digital-tooth-container:hover .tooth-svg {
            filter: drop-shadow(0 0 40px rgba(0, 229, 255, 0.9));
        }

        /* نصوص الواجهة الصامتة والفخمة */
        .hero-content {
            max-width: 800px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 2s ease forwards 2s;
        }

        .hero-content h1 {
            font-size: clamp(30px, 4vw, 50px);
            font-weight: 300;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #fff;
        }

        .hero-content h1 strong {
            font-weight: 900;
            background: linear-gradient(45deg, #fff, var(--primary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 18px;
            color: var(--text-muted);
            line-height: 1.8;
            font-weight: 300;
        }

        /* الحركات الانتقالية (Animations) */
        @keyframes riseFromTheDeep {
            0% { opacity: 0; transform: translateY(150px) scale(0.8); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        @keyframes floatSoftly {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* توافق الهواتف */
        @media (max-width: 768px) {
            header { padding: 20px; flex-direction: column; gap: 15px; }
            .nav-links { gap: 20px; justify-content: center; }
            .digital-tooth-container { width: 150px; height: 200px; }
        }
    </style>
</head>
<body>

    <!-- سماء الإبداع وأعماق المحيط -->
    <canvas id="magicCanvas"></canvas>

    <!-- شريط التنقل -->
    <header>
        <a href="#" class="brand">
            <h2>هديل أحمد بله</h2>
            <span class="batch">Batch 8</span>
        </a>
        <ul class="nav-links">
            <li><a href="#">الرؤية</a></li>
            <li><a href="#">فن الابتسامة</a></li>
            <li><a href="#">الأبحاث</a></li>
            <li><a href="#">الإرث الطبي</a></li>
        </ul>
    </header>

    <!-- واجهة التحليق -->
    <section class="hero">
        
        <!-- السن الرقمي التفاعلي (بديل للكلمات المباشرة) -->
        <div class="digital-tooth-container elements-3d">
            <svg class="tooth-svg" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- خطوط خارجية ساطعة -->
                <path d="M25 15 C35 5, 65 5, 75 15 C85 25, 90 45, 80 65 C75 75, 65 110, 55 110 C50 110, 50 85, 50 85 C50 85, 50 110, 45 110 C35 110, 25 75, 20 65 C10 45, 15 25, 25 15 Z" 
                      stroke="#00e5ff" stroke-width="2" stroke-linecap="round" fill="rgba(0, 229, 255, 0.05)"/>
                <!-- خطوط داخلية تعطي طابعاً رقمياً وهندسياً -->
                <path d="M50 15 L50 65 M25 35 L75 35 M35 85 L65 85" stroke="rgba(0, 229, 255, 0.4)" stroke-width="1" stroke-dasharray="4 4"/>
                <circle cx="50" cy="50" r="5" fill="#00e5ff" filter="blur(2px)"/>
            </svg>
        </div>

        <div class="hero-content">
            <h1>طب الأسنان ليس مجرد علم،<br>بل هو <strong>فن يعيد صياغة الحياة</strong></h1>
            <p>هنا تتلاقى دقة الطب مع أفق الإبداع اللامحدود. رحلة في أعماق المعرفة الطبية، ترتفع بنا نحو آفاق جديدة في عالم تجميل وصحة الأسنان، برؤية تتجاوز المألوف.</p>
        </div>

    </section>

    <!-- سكريبت التفاعل الصامت والجسيمات -->
    <script>
        // 1. التفاعل الصامت ثلاثي الأبعاد مع السن الرقمي
        const tooth = document.querySelector('.elements-3d');
        
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 30;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 30;
            tooth.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // 2. نظام الجسيمات (فقاعات أعماق البحار التي تتحول لنجوم)
        const canvas = document.getElementById('magicCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100; // تبدأ من الأسفل (الأعماق)
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 1.5 + 0.5; // ترتفع لأعلى
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y -= this.speedY;
                // إذا وصلت لأعلى الشاشة (السماء)، تعود للأسفل
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(0, 229, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < 150; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        // تحديث حجم الشاشة عند تغييرها
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        initParticles();
        animateParticles();
    </script>

</body>
</html>
