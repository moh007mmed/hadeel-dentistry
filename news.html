<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نبض طب الأسنان | أحدث الأخبار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-glow: #00e5ff; --bg-deep: #010613; --glass-bg: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg-deep); color: #fff; min-height: 100vh; display: flex; flex-direction: column; }

        /* الهيدر المتوافق */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(1, 6, 19, 0.9); }
        .brand { text-decoration: none; color: #fff; display: flex; align-items: center; gap: 10px; }
        .batch { font-size: 10px; border: 1px solid var(--primary-glow); padding: 2px 8px; border-radius: 10px; color: var(--primary-glow); }
        
        .main-container { flex: 1; padding: 40px 20px; max-width: 1000px; margin: 0 auto; width: 100%; }
        .page-title { text-align: center; margin-bottom: 40px; }
        .page-title h1 { color: var(--primary-glow); font-size: 28px; }

        /* شبكة أخبار متوافقة (Mobile First) */
        .news-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .news-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 900px) { .news-grid { grid-template-columns: repeat(3, 1fr); } }

        .news-card { background: var(--glass-bg); border: 1px solid rgba(0, 229, 255, 0.1); border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; }
        .news-image { height: 180px; background-size: cover; background-position: center; }
        .news-content { padding: 15px; }
        .news-title { font-size: 16px; margin-bottom: 10px; height: 50px; overflow: hidden; }
        .read-more { display: block; text-align: center; color: var(--primary-glow); text-decoration: none; border: 1px solid var(--primary-glow); padding: 8px; border-radius: 5px; margin-top: 10px; }

        /* الفوتر الموحد */
        footer { padding: 40px 20px; text-align: center; border-top: 1px solid rgba(0, 229, 255, 0.1); margin-top: 50px; color: #94a3b8; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="brand">
            <h2>هديل أحمد بله</h2>
            <span class="batch">Batch 8</span>
        </a>
    </header>

    <div class="main-container">
        <div class="page-title">
            <h1>نبض طب الأسنان</h1>
        </div>
        <div class="news-grid" id="newsGrid">
            <!-- سيتم تحميل الأخبار هنا -->
        </div>
    </div>

    <footer>
        <p>تم التصميم بشغف | جميع الحقوق محفوظة &copy; 2026</p>
    </footer>

    <script>
        async function loadNews() {
            const grid = document.getElementById('newsGrid');
            try {
                // نستخدم خادم وسيط (CORS Proxy) لضمان عمل الـ API على الهاتف
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://medicalxpress.com/rss-feed/dentistry/'));
                const data = await response.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");

                let html = '';
                items.forEach((item, index) => {
                    if (index < 6) {
                        const title = item.querySelector("title").textContent;
                        const link = item.querySelector("link").textContent;
                        const desc = item.querySelector("description").textContent.substring(0, 80) + '...';
                        html += `
                            <div class="news-card">
                                <div class="news-image" style="background-image: url('https://images.unsplash.com/photo-1606811841689-23dfddce3e95?auto=format&fit=crop&w=400&q=80')"></div>
                                <div class="news-content">
                                    <h3 class="news-title">${title}</h3>
                                    <p style="font-size: 12px; color: #aaa;">${desc}</p>
                                    <a href="${link}" target="_blank" class="read-more">اقرأ المزيد</a>
                                </div>
                            </div>`;
                    }
                });
                grid.innerHTML = html;
            } catch (e) {
                grid.innerHTML = '<p style="text-align:center">عذراً، يرجى تحديث الصفحة لمزامنة الأخبار.</p>';
            }
        }
        loadNews();
    </script>
</body>
</html>
