<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نبض طب الأسنان | أحدث الأخبار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-glow: #00e5ff;
            --secondary-glow: #0077ff;
            --bg-deep: #010613;
            --bg-ocean: #04142c;
            --text-light: #e2e8f0;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(0, 229, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(to top, var(--bg-deep), var(--bg-ocean));
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* الهيدر الموحد */
        header {
            padding: 25px 40px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(1, 6, 19, 0.95), transparent);
            backdrop-filter: blur(5px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .brand h2 { font-size: 20px; font-weight: 900; color: #fff; }
        .batch {
            font-size: 10px; border: 1px solid var(--primary-glow);
            color: var(--primary-glow); padding: 3px 10px; border-radius: 20px;
        }

        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a {
            color: var(--text-light); text-decoration: none; font-size: 14px;
            transition: 0.4s ease;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-glow); text-shadow: 0 0 15px var(--primary-glow);
        }

        /* عنوان الصفحة الرئيسي */
        .page-header {
            text-align: center;
            margin-top: 150px;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .page-header h1 {
            font-size: 40px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 15px;
        }

        .page-header h1 span {
            color: var(--primary-glow);
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* مؤشر التحميل (Loader) */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 30vh;
        }

        .scanner {
            width: 100px;
            height: 100px;
            border: 2px solid rgba(0, 229, 255, 0.2);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }

        .scanner::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary-glow);
            box-shadow: 0 0 15px var(--primary-glow);
            animation: scan 2s infinite ease-in-out;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .loader-text {
            margin-top: 20px;
            color: var(--primary-glow);
            font-size: 14px;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        /* شبكة الأخبار */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto 100px;
            padding: 0 20px;
        }

        .news-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-glow);
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.15);
        }

        .news-image {
            width: 100%;
            height: 200px;
            background-color: #0b1a30;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .news-image::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, var(--bg-deep), transparent);
        }

        .news-content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .news-date {
            color: var(--primary-glow);
            font-size: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .news-title {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .news-excerpt {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .read-more {
            display: inline-block;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--primary-glow);
            color: var(--primary-glow);
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            transition: all 0.3s ease;
            font-weight: 700;
        }

        .read-more:hover {
            background: var(--primary-glow);
            color: var(--bg-deep);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        }

        /* الفوتر المصغر */
        footer {
            margin-top: auto;
            text-align: center;
            padding: 30px;
            border-top: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; padding: 20px; }
            .page-header h1 { font-size: 30px; }
        }
    </style>
</head>
<body>

    <!-- شريط التنقل -->
    <header>
        <a href="index.html" class="brand">
            <h2>هديل أحمد بله</h2>
            <span class="batch">Batch 8</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="#" class="active">نبض الأسنان (API)</a></li>
        </ul>
    </header>

    <!-- عنوان الصفحة -->
    <div class="page-header">
        <h1>نبض <span>طب الأسنان</span></h1>
        <p>صفحة مرتبطة برمجياً (API) مع أحدث المصادر الطبية العالمية لتزويدك بأخر الأبحاث والأخبار تلقائياً.</p>
    </div>

    <!-- مؤشر التحميل (يختفي بعد جلب البيانات) -->
    <div class="loader-container" id="loader">
        <div class="scanner"></div>
        <div class="loader-text">جارِ الاتصال بالشبكة الطبية العالمية...</div>
    </div>

    <!-- حاوية الأخبار -->
    <div class="news-grid" id="newsGrid">
        <!-- سيتم حقن الأخبار هنا عبر الـ JavaScript -->
    </div>

    <!-- الفوتر -->
    <footer>
        <p>تم التصميم بشغف | يعمل بتقنية <strong>Live API Fetching</strong> &copy; 2026</p>
    </footer>

    <!-- سكريبت جلب الأخبار API -->
    <script>
        // رابط RSS الخاص بأخبار طب الأسنان من MedicalXpress
        const rssUrl = 'https://medicalxpress.com/rss-feed/dentistry/';
        // خدمة مجانية لتحويل الـ RSS إلى JSON API
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

        const newsGrid = document.getElementById('newsGrid');
        const loader = document.getElementById('loader');

        // دالة جلب البيانات (Fetch API)
        async function fetchDentalNews() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status === 'ok' && data.items.length > 0) {
                    displayNews(data.items);
                } else {
                    throw new Error('لم يتم العثور على أخبار');
                }
            } catch (error) {
                console.error('خطأ في جلب البيانات:', error);
                // خطة بديلة (Fallback) في حال تعطل النت أو فشل الـ API
                displayFallbackNews();
            }
        }

        // دالة عرض الأخبار
        function displayNews(articles) {
            loader.style.display = 'none'; // إخفاء مؤشر التحميل
            let htmlContent = '';

            // سنعرض أحدث 6 أخبار فقط
            const latestArticles = articles.slice(0, 6);

            latestArticles.forEach(article => {
                // محاولة استخراج صورة، وإذا لم توجد نضع صورة افتراضية
                const imageUrl = article.thumbnail || 'https://images.unsplash.com/photo-1606811841689-23dfddce3e95?auto=format&fit=crop&w=600&q=80';
                
                // تنسيق التاريخ
                const pubDate = new Date(article.pubDate).toLocaleDateString('ar-EG', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });

                htmlContent += `
                    <div class="news-card">
                        <div class="news-image" style="background-image: url('${imageUrl}');"></div>
                        <div class="news-content">
                            <div class="news-date">⏳ ${pubDate}</div>
                            <h3 class="news-title">${article.title}</h3>
                            <p class="news-excerpt">${article.description.replace(/<[^>]+>/g, '').substring(0, 100)}...</p>
                            <a href="${article.link}" target="_blank" class="read-more">اقرأ المقال كاملاً</a>
                        </div>
                    </div>
                `;
            });

            newsGrid.innerHTML = htmlContent;
        }

        // الخطة البديلة (Mock Data) إذا فشل الـ API
        function displayFallbackNews() {
            loader.style.display = 'none';
            const fallbackData = [
                {
                    title: "تطور جديد في زراعة الأسنان بتقنية النانو",
                    pubDate: new Date().toISOString(),
                    description: "علماء يكتشفون طريقة جديدة لدمج الغرسات السنية مع عظم الفك باستخدام مواد نانوية تسرع من عملية الشفاء بنسبة 40%.",
                    link: "#",
                    thumbnail: "https://images.unsplash.com/photo-1598256989800-fea5f6c8270b?auto=format&fit=crop&w=600&q=80"
                },
                {
                    title: "الذكاء الاصطناعي في تشخيص تسوس الأسنان",
                    pubDate: new Date().toISOString(),
                    description: "برمجيات جديدة تعتمد على الذكاء الاصطناعي قادرة على اكتشاف التسوس المخفي في الأشعة السينية بدقة تتجاوز 95%.",
                    link: "#",
                    thumbnail: "https://images.unsplash.com/photo-1609840114035-3c981b782dfe?auto=format&fit=crop&w=600&q=80"
                },
                {
                    title: "ارتباط قوي بين التهاب اللثة وأمراض القلب",
                    pubDate: new Date().toISOString(),
                    description: "دراسة حديثة تؤكد أن العناية بصحة اللثة قد تقلل من خطر الإصابة بالأزمات القلبية بشكل ملحوظ.",
                    link: "#",
                    thumbnail: "https://images.unsplash.com/photo-1574406280735-351fc1a7c5e0?auto=format&fit=crop&w=600&q=80"
                }
            ];
            displayNews(fallbackData);
        }

        // تشغيل الدالة فور تحميل الصفحة
        window.addEventListener('DOMContentLoaded', fetchDentalNews);

    </script>
</body>
</html>
